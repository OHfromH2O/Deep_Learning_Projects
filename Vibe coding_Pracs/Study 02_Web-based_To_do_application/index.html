<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tasks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card" role="main" aria-label="할 일 관리 앱">

    <!-- ── 앱 헤더: 타이틀 + 다크모드 토글 ── -->
    <div class="app-header">
      <h1 class="title">My Tasks</h1>
      <label
        class="theme-switch"
        title="다크 모드 토글 (Alt+D)"
        aria-label="다크 모드 토글"
      >
        <input
          type="checkbox"
          id="themeToggle"
          role="switch"
          aria-checked="false"
        >
        <span class="switch-track">
          <span class="switch-thumb"></span>
        </span>
        <span class="switch-icon" id="themeIcon" aria-hidden="true">🌙</span>
      </label>
    </div>

    <!--
      ARIA 공지 영역: 시각적으로는 숨겨지지만
      스크린 리더가 변경 사항을 읽어준다.
    -->
    <div
      id="ariaAnnounce"
      class="sr-only"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <!-- ── 진행률 대시보드 ── -->
    <section
      class="dashboard"
      id="dashboard"
      aria-label="진행률 통계"
    >
      <!-- 전체 진행률 + 응원 메시지 -->
      <div class="dash-overall">
        <div class="dash-overall-header">
          <span class="dash-label">전체 진행률</span>
          <span
            id="dashSummary"
            class="dash-summary"
            aria-live="polite"
            aria-label="전체 완료 현황"
          >0/0 완료 (0%)</span>
        </div>
        <div
          id="progressTrack"
          class="progress-track"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
          aria-label="전체 진행률"
        >
          <div id="progressBar" class="progress-bar" style="width:0%"></div>
        </div>
        <!-- 완료율에 따른 응원 메시지 (실시간 업데이트) -->
        <p id="encouragement" class="encouragement" aria-live="polite"></p>
      </div>

      <!-- 카테고리별 미니 통계 + 오늘 추가 배지 -->
      <div class="dash-stats">
        <div class="dash-cat">
          <div class="dash-cat-header">
            <span class="dash-cat-dot work"     aria-hidden="true"></span>
            <span class="dash-cat-name">💼 업무</span>
            <span class="dash-cat-count" id="dashWorkCount"     aria-label="업무 완료 현황">0/0</span>
          </div>
          <div class="progress-track mini">
            <div class="progress-bar work"     id="barWork"     style="width:0%"></div>
          </div>
        </div>

        <div class="dash-cat">
          <div class="dash-cat-header">
            <span class="dash-cat-dot personal" aria-hidden="true"></span>
            <span class="dash-cat-name">🌿 개인</span>
            <span class="dash-cat-count" id="dashPersonalCount" aria-label="개인 완료 현황">0/0</span>
          </div>
          <div class="progress-track mini">
            <div class="progress-bar personal" id="barPersonal" style="width:0%"></div>
          </div>
        </div>

        <div class="dash-cat">
          <div class="dash-cat-header">
            <span class="dash-cat-dot study"    aria-hidden="true"></span>
            <span class="dash-cat-name">📚 공부</span>
            <span class="dash-cat-count" id="dashStudyCount"    aria-label="공부 완료 현황">0/0</span>
          </div>
          <div class="progress-track mini">
            <div class="progress-bar study"    id="barStudy"    style="width:0%"></div>
          </div>
        </div>

        <!-- 오늘 추가 배지 -->
        <div class="dash-today" aria-label="오늘 추가된 할 일 개수">
          <span class="dash-today-num"   id="dashTodayCount">0</span>
          <span class="dash-today-label">오늘 추가</span>
        </div>
      </div>
    </section>

    <!-- ── 오늘의 격언 ── -->
    <div class="quote-strip" id="quoteStrip" aria-label="오늘의 격언">
      <span class="quote-icon" aria-hidden="true">💬</span>
      <span class="quote-text" id="quoteText"></span>
    </div>

    <!-- ── 검색 ── -->
    <div class="search-row" role="search">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input
        type="search"
        id="searchInput"
        class="search-input"
        placeholder="할 일 검색..."
        aria-label="할 일 검색"
        autocomplete="off"
      >
      <button
        id="searchClear"
        class="search-clear hidden"
        aria-label="검색어 초기화"
      >✕</button>
    </div>
    <!-- 검색 결과 개수: 시각적으로 숨겨진 스크린 리더 전용 -->
    <p id="searchStatus" class="sr-only" aria-live="polite"></p>

    <!-- ── 새 할 일 입력 ── -->
    <div class="input-row">
      <select
        id="categorySelect"
        class="category-select"
        aria-label="카테고리 선택"
      >
        <option value="work">💼 업무</option>
        <option value="personal">🌿 개인</option>
        <option value="study">📚 공부</option>
      </select>
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="새로운 할 일... (Alt+N)"
        maxlength="200"
        aria-label="새 할 일 입력"
        autocomplete="off"
      >
      <button id="addBtn" class="add-btn">추가</button>
    </div>

    <!-- ── 필터 버튼 + 정렬 + 툴바 ── -->
    <div class="filter-area">
      <!-- 카테고리 필터 -->
      <div class="filter-row" role="group" aria-label="카테고리 필터">
        <button class="filter-btn active" data-filter="all"      aria-pressed="true" >전체</button>
        <button class="filter-btn"        data-filter="work"     aria-pressed="false">💼 업무</button>
        <button class="filter-btn"        data-filter="personal" aria-pressed="false">🌿 개인</button>
        <button class="filter-btn"        data-filter="study"    aria-pressed="false">📚 공부</button>
      </div>

      <!-- 정렬 + 남은 개수 배지 + 완료 삭제 -->
      <div class="sort-toolbar">
        <select
          id="sortSelect"
          class="sort-select"
          aria-label="정렬 기준 선택"
        >
          <option value="manual" >✋ 직접 정렬</option>
          <option value="newest" >🕐 최신순</option>
          <option value="oldest" >🕐 오래된순</option>
          <option value="category">🏷 카테고리순</option>
        </select>
        <span
          id="remainingBadge"
          class="remaining-badge hidden"
          aria-live="polite"
        ></span>
        <button
          id="clearCompletedBtn"
          class="clear-btn hidden"
          aria-label="완료된 항목 모두 삭제"
        >완료 삭제</button>
      </div>
    </div>

    <!-- ── 할 일 목록 ── -->
    <ul
      id="taskList"
      class="task-list"
      aria-label="할 일 목록"
      aria-live="polite"
    ></ul>

    <!-- 빈 상태 메시지 -->
    <p id="emptyMessage" class="empty-message hidden" role="status">
      할 일이 없습니다. 추가해보세요!
    </p>

    <!-- ── 데이터 내보내기 / 가져오기 ── -->
    <div class="data-actions" aria-label="데이터 관리">
      <button id="exportBtn" class="data-btn" aria-label="JSON으로 내보내기">
        <span aria-hidden="true">↓</span> 내보내기
      </button>
      <button id="importBtn" class="data-btn" aria-label="JSON 파일 가져오기">
        <span aria-hidden="true">↑</span> 가져오기
      </button>
      <!-- 파일 선택 input은 JS에서 programmatically 클릭 -->
      <input
        type="file"
        id="importFile"
        accept=".json"
        hidden
        aria-hidden="true"
      >
    </div>

    <!-- 키보드 단축키 안내 -->
    <div class="shortcut-hint" aria-label="키보드 단축키">
      Alt+N 입력창 &nbsp;·&nbsp;
      Alt+1~4 필터 &nbsp;·&nbsp;
      Alt+D 다크모드 &nbsp;·&nbsp;
      Alt+Z 실행취소
    </div>

  </div><!-- /.card -->

  <!-- ── 토스트 알림 (고정 위치, 화면 하단 중앙) ── -->
  <div
    id="toastContainer"
    class="toast-container"
    role="alert"
    aria-live="assertive"
    aria-atomic="true"
  ></div>

  <script src="script.js"></script>
</body>
</html>
